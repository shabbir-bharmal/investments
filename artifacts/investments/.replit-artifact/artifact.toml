kind = "web"
previewPath = "/"
title = "Investments"
version = "1.0.0"
id = "artifacts/investments"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18616

[services.development]
run = "pnpm --filter @workspace/investments run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investments", "run", "build" ]
publicDir = "artifacts/investments/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18616"
BASE_PATH = "/"
